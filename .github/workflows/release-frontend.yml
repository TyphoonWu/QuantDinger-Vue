name: Publish frontend image to GHCR

# Build the Vue SPA and publish a multi-arch nginx image to GitHub Container
# Registry. Consumed by QuantDinger's docker-compose files as
#   ghcr.io/<owner>/quantdinger-frontend:<tag>
#
# Triggers:
#   - push of a version tag matching `v*` (e.g. v3.0.9) -> semver + latest tags
#   - manual workflow_dispatch -> short-SHA tag only (ad-hoc testing)
#
# First-time setup: after the first successful run, visit
#   https://github.com/users/<owner>/packages/container/quantdinger-frontend/settings
# and set the package visibility to public if anonymous `docker pull` is desired.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/quantdinger-frontend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: false
